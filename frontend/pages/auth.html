<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Essential Meta Information -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShineHub Car Wash - Login & Register</title>
    <meta name="description"
        content="Direct login and registration for ShineHub Car Wash customers." />

    <!-- External Font Imports -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="../Stayl/style.css" />
</head>

<body>
    <div class="site-shell">
        <!-- Header Section: Branding and Navigation -->
        <header class="header">
            <div class="container nav-bar">
                <a href="#home" class="brand">
                    <span class="brand-mark">S</span>
                    <div>
                        <strong>ShineHub</strong>
                        <small data-i18n="brandTag">Car Wash & Detailing</small>
                    </div>
                </a>

                <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <nav class="nav" id="mainNav">
                    <a href="home.html" data-i18n="navHome">Home</a>
                    <a href="About.html" data-i18n="navAbout">About</a>
                    <a href="services.html" data-i18n="navServices">Services</a>
                    <a href="booking.html" data-i18n="navBooking">Booking</a>
                    <a href="auth.html" data-i18n="navLogin">Login</a>
                    <a href="contact.html" data-i18n="navContact">Contact</a>
                </nav>

                <div class="header-actions">
                    <button class="lang-toggle" id="languageToggle" type="button">AR</button>
                    <a href="booking.html" class="btn btn-primary" data-i18n="bookNow">Book Now</a>
                </div>
            </div>
        </header>

        <!-- Main Authentication Area -->
        <section class="section alt-section" id="auth">
            <div class="container auth-grid">
                <!-- Section Introduction -->
                <div class="section-heading left">
                    <span class="eyebrow" data-i18n="authEyebrow">Account Access</span>
                    <h2 data-i18n="authTitle">Manage your bookings</h2>
                    <p data-i18n="authText">Log in or create a new account to keep track of your car wash history and book services faster.</p>
                </div>

                <!-- Authentication Card: Login and Registration Tabs -->
                <div class="auth-card">
                    <div class="tabs">
                        <button type="button" class="tab-btn active" data-tab="login"
                            data-i18n="loginTab">Login</button>
                        <button type="button" class="tab-btn" data-tab="register"
                            data-i18n="registerTab">Register</button>
                    </div>

                    <!-- Simplified Login Form (Social options and Forgot Password removed) -->
                    <form id="loginForm" class="auth-form active">
                        <input type="hidden" name="action" value="login" />
                        <label>
                            <span data-i18n="loginIdentityLabel">Username or Email</span>
                            <input type="text" name="identity" required data-i18n-placeholder="loginIdentityPlaceholder"
                                placeholder="Enter username or email" />
                        </label>
                        <label>
                            <span data-i18n="passwordLabel">Password</span>
                            <input type="password" name="password" required data-i18n-placeholder="passwordPlaceholder"
                                placeholder="Enter your password" />
                        </label>
                        <button type="submit" class="btn btn-primary btn-block" data-i18n="loginBtn">Login</button>
                    </form>

                    <!-- Comprehensive Registration Form -->
                    <form id="registerForm" class="auth-form">
                        <input type="hidden" name="action" value="register" />
                        <label>
                            <span data-i18n="fullNameLabel">Full Name</span>
                            <input type="text" name="full_name" required data-i18n-placeholder="fullNamePlaceholder"
                                placeholder="Enter your full name" />
                        </label>
                        <label>
                            <span data-i18n="emailLabel">Email Address</span>
                            <input type="email" name="email" required data-i18n-placeholder="emailPlaceholder"
                                placeholder="Enter your email" />
                        </label>
                        <label>
                            <span data-i18n="phoneLabel">Phone Number</span>
                            <input type="tel" name="phone" required data-i18n-placeholder="phonePlaceholder"
                                placeholder="Enter your phone number" />
                        </label>
                        <label>
                            <span data-i18n="passwordLabel">Password</span>
                            <input type="password" name="password" required minlength="6"
                                data-i18n-placeholder="passwordPlaceholder" placeholder="Enter your password" />
                        </label>
                        <label>
                            <span data-i18n="confirmPasswordLabel">Confirm Password</span>
                            <input type="password" name="confirm_password" required minlength="6"
                                data-i18n-placeholder="confirmPasswordPlaceholder"
                                placeholder="Re-enter your password" />
                        </label>
                        <button type="submit" class="btn btn-primary btn-block" data-i18n="registerBtn">Create
                            Account</button>
                    </form>
                </div>
            </div>
        </section>

        <!-- Footer Section -->
        <footer class="footer">
            <div class="container footer-content">
                <p>© <span id="currentYear"></span> ShineHub. <span data-i18n="footerText">All rights reserved. Clean
                        cars, happy customers.</span></p>
            </div>
        </footer>
    </div>


    <script src="../Script/Script.js"></script>
<div class="toast" id="toast"></div>
</body>
<!-- gioo -->

</html>
